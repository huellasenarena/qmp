name: qcrear sweep

on:
  schedule:
    # Corre todos los días a las 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    # También se puede lanzar manualmente

permissions:
  contents: write

concurrency:
  group: qcrear-publish
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git identity
        run: |
          git config user.name "qmp-bot"
          git config user.email "qmp-bot@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Write service account keyfile
        env:
          QMP_GDOCS_SA_KEY_JSON: ${{ secrets.QMP_GDOCS_SA_KEY_JSON }}
        run: |
          mkdir -p .secrets
          python - <<'PY'
          import os, pathlib
          p = pathlib.Path(".secrets/sa.json")
          p.write_text(os.environ["QMP_GDOCS_SA_KEY_JSON"], encoding="utf-8")
          print("Wrote", p)
          PY
          chmod 600 .secrets/sa.json

      - name: Write gdocs.json config
        env:
          QMP_GDOCS_CONFIG_JSON: ${{ secrets.QMP_GDOCS_CONFIG_JSON }}
        run: |
          mkdir -p ~/.config/qmp
          python - <<'PY'
          import os, pathlib
          p = pathlib.Path.home() / ".config" / "qmp" / "gdocs.json"
          p.write_text(os.environ["QMP_GDOCS_CONFIG_JSON"], encoding="utf-8")
          print("Wrote", p)
          PY

      - name: Run sweep
        env:
          QMP_GDOCS_SA_KEYFILE: ${{ github.workspace }}/.secrets/sa.json
          PYTHONPATH: ${{ github.workspace }}/scripts:${{ github.workspace }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        working-directory: scripts
        run: |
          python qcrear.py --sweep --auto --yes
