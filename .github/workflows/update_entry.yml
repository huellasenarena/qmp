name: Update Entry

# ──────────────────────────────────────────────────────────
# Uso: Actions → Update Entry → Run workflow
#   date            : YYYY-MM-DD de la entrada a actualizar
#   regen_keywords  : true  → regenera keywords con OpenAI
#                     false → conserva las keywords existentes (default)
# ──────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Fecha a actualizar (YYYY-MM-DD)'
        required: true
        type: string
      regen_keywords:
        description: 'Regenerar keywords (por defecto: conservar)'
        required: false
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write service account keyfile
        env:
          QMP_GDOCS_SA_KEY_JSON: ${{ secrets.QMP_GDOCS_SA_KEY_JSON }}
        run: |
          mkdir -p .secrets
          python - <<'PY'
          import os, pathlib
          p = pathlib.Path(".secrets/sa.json")
          p.write_text(os.environ["QMP_GDOCS_SA_KEY_JSON"], encoding="utf-8")
          print("Wrote", p)
          PY
          chmod 600 .secrets/sa.json

      - name: Write gdocs.json config
        env:
          QMP_GDOCS_CONFIG_JSON: ${{ secrets.QMP_GDOCS_CONFIG_JSON }}
        run: |
          mkdir -p ~/.config/qmp
          python - <<'PY'
          import os, pathlib
          p = pathlib.Path.home() / ".config" / "qmp" / "gdocs.json"
          p.write_text(os.environ["QMP_GDOCS_CONFIG_JSON"], encoding="utf-8")
          print("Wrote", p)
          PY

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate date input
        run: |
          if ! echo "${{ inputs.date }}" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "ERROR: fecha inválida: '${{ inputs.date }}' — usa YYYY-MM-DD"
            exit 1
          fi

      - name: Update entry
        env:
          QMP_GDOCS_SA_KEYFILE: ${{ github.workspace }}/.secrets/sa.json
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ARGS="--date ${{ inputs.date }}"
          if [ "${{ inputs.regen_keywords }}" = "true" ]; then
            ARGS="$ARGS --regen-keywords"
          fi
          python scripts/update_entry.py $ARGS
